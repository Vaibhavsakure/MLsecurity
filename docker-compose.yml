# ============================================================================
# SocialGuard AI — Docker Compose (Unified)
# Usage: docker-compose up --build
#
# This builds both frontend + backend into a single container.
# Access the full app at: http://localhost:8000
# ============================================================================

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    volumes:
      - ./backend/models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/api/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
