# ============================================================================
# SocialGuard AI — CI/CD Pipeline
# Runs on push/PR to main: backend tests, frontend tests, build checks, E2E
# ============================================================================

name: SocialGuard AI CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # -------------------------------------------------------
  # Backend: Python tests (68+ tests)
  # -------------------------------------------------------
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        env:
          TESTING: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # -------------------------------------------------------
  # Frontend: Vitest unit tests + build check
  # -------------------------------------------------------
  frontend-tests:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --reporter=verbose

      - name: Build check
        run: npm run build

  # -------------------------------------------------------
  # Docker: Verify compose builds successfully
  # -------------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          echo "GEMINI_API_KEY=test" > backend/.env
          echo "FIREBASE_CREDENTIALS_PATH=none" >> backend/.env
          echo "CORS_ORIGINS=http://localhost:4173" >> backend/.env

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Verify images created
        run: |
          docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "fack|socialguard|backend|frontend" || \
          docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>" | head -10

  # -------------------------------------------------------
  # E2E: Playwright tests (requires both servers)
  # -------------------------------------------------------
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    # Only run E2E on push to main (not every PR to save CI minutes)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend server
        working-directory: ./backend
        env:
          TESTING: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python -m uvicorn api:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1

      - name: Start frontend dev server
        working-directory: ./frontend
        env:
          VITE_API_URL: "http://localhost:8000"
        run: |
          npm run dev &
          sleep 8

      - name: Run E2E tests
        working-directory: ./e2e
        run: npx playwright test --reporter=html

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
